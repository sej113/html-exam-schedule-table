<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0%;
            padding: 0%;
            box-sizing: border-box;
        }
        .container{
           height: 100vh;
           width: 100vw;
            box-sizing: border-box;
            background-color: #725ec2;
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 40px;
            justify-content: center;
           padding: 10px;
        }
        .item{
            background-color: aliceblue;
            display: grid;
            justify-content: center;
            text-align: center;

        }
.item1{
    display: grid;
    grid-column-start:1;
    grid-column-end: 4;
    background-color: rgb(218, 214, 214);
   text-align: center;
    
}
.item3{
    display: grid;
    grid-row-start:2;
    grid-row-end: 4;
    background-color: rgb(190, 17, 17);
   text-align: center;
}
.item2{
    display: grid;
    grid-column-start:2;
    grid-column-end: 4;
    background-color: rgb(69, 39, 187);
   text-align: center;
    
}
.item6{
    display: grid;
    grid-column-start:1;
    grid-column-end: 4;
    background-color: rgb(114, 219, 39);
   text-align: center;
    
}


    </style>
</head>
<body>
    <div class="container">
        <div class="item1">item 1</div>
        <div  class="item2">item2</div>
        <div  class="item3">item3</div>
        <div  class="item">item4</div>
        <div  class="item">item5</div>
        <div  class="item6">item6</div>
        
    </div>
</body>
</html>
